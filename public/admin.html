<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Panel de Control - EVONEC</title>
</head>
<body class="bg-[#111827] text-white p-4 md:p-8 font-sans antialiased">

    <div class="max-w-6xl mx-auto mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-[#FB7185] uppercase tracking-widest">Agenda de Turnos</h1>
            <p class="text-gray-400 text-sm">Gestión de turnos en tiempo real</p>
        </div>
        <div class="bg-acento/10 px-6 py-3 rounded-xl border border-acento/30">
    <span class="text-[10px] text-acento uppercase block font-bold tracking-tighter">Turnos para hoy</span>
    <span id="contador-hoy" class="text-2xl font-black text-white leading-none">0</span>
</div>
        <div class="bg-[#1F2937] px-6 py-3 rounded-xl border border-gray-700">
            <span class="text-xs text-gray-400 uppercase block">Estado del Servidor</span>
            <span class="text-green-400 font-bold flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                ONLINE
            </span>
        </div>
    </div>
    
 <div class="w-full overflow-hidden bg-[#1F2937] border-y border-gray-700 md:border-x md:rounded-2xl shadow-2xl">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[600px]">
            <thead class="bg-[#111827]/50 border-b border-gray-700">
                <tr>
                    <th class="px-4 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Fecha</th>
                    <th class="px-4 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Hora</th>
                    <th class="px-4 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Cliente</th>
                    <th class="px-4 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider">WhatsApp</th>
                    <th class="px-4 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-turnos" class="divide-y divide-gray-700/50">
                </tbody>
        </table>
    </div>
</div>

   <script>
    async function cargarTurnos() {
        try {
            const res = await fetch('/api/admin/turnos');
            const turnos = await res.json();
            
            const tabla = document.getElementById('tabla-turnos');
            const contadorHoy = document.getElementById('contador-hoy');
            // Si agregás un id="contador-total" en tu HTML, usalo acá:
            const contadorTotal = document.getElementById('contador-total');

            // 1. Fecha de hoy REAL (Formato YYYY-MM-DD local)
            const hoy = new Date().toLocaleDateString('sv-SE'); 

            // 2. Lógica de Contadores
            const turnosDeHoy = turnos.filter(t => t.fecha.trim() === hoy).length;
            
            // Actualizamos la UI
            if(contadorHoy) contadorHoy.textContent = turnosDeHoy;
            if(contadorTotal) contadorTotal.textContent = turnos.length;

            // 3. Renderizado de Tabla
            if (turnos.length === 0) {
                tabla.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-gray-500 italic">No hay turnos registrados.</td></tr>`;
                return;
            }

            tabla.innerHTML = turnos.map(t => `
                <tr class="hover:bg-white/[0.02] transition-colors border-b border-gray-700/50">
                    <td class="px-6 py-4 text-sm ${t.fecha === hoy ? 'text-green-400 font-bold' : 'text-gray-400'}">${t.fecha}</td>
                    <td class="px-6 py-4 font-bold text-[#FB7185]">${t.hora}</td>
                    <td class="px-6 py-4 text-sm font-semibold">${t.cliente_nombre}</td>
                    <td class="px-6 py-4">
                        <a href="https://wa.me/${t.cliente_telefono}?text=Hola%20${t.cliente_nombre},%20te%20confirmo%20tu%20turno%20para%20el%20${t.fecha}%20a%20las%20${t.hora}%20hs." 
                         target="_blank" 
                           class="text-blue-400 underline">
                              ${t.cliente_telefono}
                         </a>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="borrarTurno(${t.id})" class="text-[10px] font-bold bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                            ELIMINAR
                        </button>
                    </td>
                </tr>
            `).join('');

        } catch (error) {
            console.error('Error crítico en Panel EVONEC:', error);
        }
    }

    async function borrarTurno(id) {
        if (!confirm('¿Confirmás que querés borrar este turno de la agenda?')) return;
        const res = await fetch(`/api/admin/turnos/${id}`, { method: 'DELETE' });
        if (res.ok) cargarTurnos();
    }

    cargarTurnos();
</script>
</body>
</html>
